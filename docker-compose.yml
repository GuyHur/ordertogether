version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: ordertogether_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: sample_password123
      POSTGRES_DB: ordertogether
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    image: poortuna/ordertogether/ordertogether-backend:v1.0.0
    container_name: ordertogether_backend
    depends_on:
      - db
    environment:
      # Instruct the backend to reconstruct a connection string to talk to Postgres!
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: sample_password123
      POSTGRES_DB: ordertogether
      # Used for first superuser
      SUPERUSER_USERNAME: "admin"
      # JWT Encryption
      SECRET_KEY: "change_me_in_production"
    volumes:
      # Maps local uploads folder so receipt images aren't lost on restart
      - ./backend/uploads:/app/uploads
      # Used only if SQLite fallback is triggered, ignoring since we have Postgres
      - ./backend/data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: poortuna/ordertogether/ordertogether-frontend:v1.0.0
    container_name: ordertogether_frontend
    depends_on:
      - backend
    ports:
      # Exposes the frontend Application on port 8080
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
